name: Tag and Release

on:
  push:
    branches:
      - 'release_v[0-9].[0-9].x'

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch name
        id: branch
        run: |
          BRANCH=${{ github.ref_name }}
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "Current branch: ${BRANCH}"

          # Extract major.minor from branch name (release_v0.0.x -> 0.0)
          MAJOR_MINOR=$(echo ${BRANCH} | grep -oP 'release_v\K[0-9]+\.[0-9]+')
          echo "major_minor=${MAJOR_MINOR}" >> $GITHUB_OUTPUT

      - name: Fetch develop branch
        run: git fetch origin develop

      - name: Read VERSION from release branch
        id: release_version
        run: |
          RELEASE_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "Release branch VERSION: ${RELEASE_VERSION}"

      - name: Read VERSION from develop
        id: develop_version
        run: |
          DEVELOP_VERSION=$(git show origin/develop:VERSION | tr -d '[:space:]')
          echo "version=${DEVELOP_VERSION}" >> $GITHUB_OUTPUT
          echo "Develop branch VERSION: ${DEVELOP_VERSION}"

      - name: Validate VERSION format
        id: validate_format
        run: |
          RELEASE_VER="${{ steps.release_version.outputs.version }}"
          DEVELOP_VER="${{ steps.develop_version.outputs.version }}"
          MAJOR_MINOR="${{ steps.branch.outputs.major_minor }}"

          # Check if versions match format major.minor.patch
          if ! echo "${RELEASE_VER}" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "::error::Release VERSION '${RELEASE_VER}' does not match format major.minor.patch"
            exit 1
          fi

          if ! echo "${DEVELOP_VER}" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "::error::Develop VERSION '${DEVELOP_VER}' does not match format major.minor.patch"
            exit 1
          fi

          # Check if develop version matches release branch major.minor
          DEVELOP_MAJOR_MINOR=$(echo "${DEVELOP_VER}" | cut -d. -f1,2)
          if [ "${DEVELOP_MAJOR_MINOR}" != "${MAJOR_MINOR}" ]; then
            echo "::error::Develop VERSION ${DEVELOP_VER} does not match release branch ${MAJOR_MINOR}.x"
            exit 1
          fi

          echo "validated=true" >> $GITHUB_OUTPUT

      - name: Check develop VERSION > release VERSION
        id: compare_versions
        run: |
          RELEASE_VER="${{ steps.release_version.outputs.version }}"
          DEVELOP_VER="${{ steps.develop_version.outputs.version }}"
          MAJOR_MINOR="${{ steps.branch.outputs.major_minor }}"

          # Compare versions as numbers (sort -V handles version comparison)
          if [ "$(echo -e "${RELEASE_VER}\n${DEVELOP_VER}" | sort -V | tail -n 1)" != "${DEVELOP_VER}" ]; then
            echo "::error::Develop VERSION (${DEVELOP_VER}) must be greater than release VERSION (${RELEASE_VER})"
            exit 1
          fi

          # Check that develop VERSION is not {major}.{minor}.99
          MAX_PATCH="${MAJOR_MINOR}.99"
          if [ "${DEVELOP_VER}" = "${MAX_PATCH}" ]; then
            echo "::error::Develop VERSION cannot be ${MAX_PATCH} (maximum patch version)"
            exit 1
          fi

          echo "Develop VERSION ${DEVELOP_VER} > Release VERSION ${RELEASE_VER} ✓"
          echo "Develop VERSION is not ${MAX_PATCH} ✓"
          echo "validated=true" >> $GITHUB_OUTPUT

  tag-and-release:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${VERSION} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${VERSION} does not exist"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Get previous tag
        id: prev_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"

          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" > changelog.md
            echo "" >> changelog.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" >> changelog.md
          else
            echo "## What's Changed" > changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s (%h)" | head -20 >> changelog.md
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-to-main:
    needs: tag-and-release
    runs-on: ubuntu-latest
    if: needs.tag-and-release.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run push-to-main script
        run: |
          chmod +x .github/workflows/push-to-main.sh
          .github/workflows/push-to-main.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
